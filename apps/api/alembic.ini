[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# La URL de conexión se establece programáticamente en alembic/env.py
# leyendo DATABASE_URL desde variables de entorno (via pydantic Settings).
# Ver apps/api/app/core/config.py y apps/api/alembic/env.py.
# Documenta el valor local en .env.example — nunca hardcodees credenciales aquí.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
