apiVersion: apps/v1
kind: Deployment
metadata:
  name: etl-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: etl-worker
  template:
    metadata:
      labels:
        app: etl-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/etl-worker:latest
          command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info"]
          env:
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: etl-secrets
                  key: RABBITMQ_URL
