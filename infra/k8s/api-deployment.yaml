apiVersion: apps/v1
kind: Deployment
metadata:
  name: etl-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: etl-api
  template:
    metadata:
      labels:
        app: etl-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/etl-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: etl-secrets
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8000
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
