apiVersion: apps/v1
kind: Deployment
metadata:
  name: etl-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: etl-web
  template:
    metadata:
      labels:
        app: etl-web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/etl-web:latest
          ports:
            - containerPort: 3000
